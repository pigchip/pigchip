name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Checkout One-DSA
        uses: actions/checkout@v4
        with:
          repository: pigchip/one-dsa
          ref: main
          path: one-dsa-src

      - name: Build One-DSA (served at /one-dsa)
        run: |
          cd one-dsa-src
          npm ci
          npm run build

      - name: Nest One-DSA under /one-dsa
        run: |
          mkdir -p dist/one-dsa
          cp -r one-dsa-src/dist/. dist/one-dsa/

      - name: Checkout Local RAG
        uses: actions/checkout@v4
        with:
          repository: pigchip/local-rag
          ref: main
          path: local-rag-src

      - name: Build Local RAG frontend (served at /local-rag)
        run: |
          cd local-rag-src/frontend
          npm ci
          npm run build
        env:
          BASE_PATH: /local-rag/
          VITE_API_BASE_URL: https://api.aguzmancruz.com

      - name: Nest Local RAG under /local-rag
        run: |
          mkdir -p dist/local-rag
          cp -r local-rag-src/frontend/dist/. dist/local-rag/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
